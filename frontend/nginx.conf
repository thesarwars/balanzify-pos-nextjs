server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # health probe (used by the container healthcheck and the outer reverse proxy)
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # immutable Next static assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Next static export emits a folder + index.html per route (trailingSlash:true).
    # Resolve real files first, then fall back to the client-rendered shell.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ $uri.html /index.html;
    }
}
