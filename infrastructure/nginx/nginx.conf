worker_processes auto;
worker_rlimit_nofile 65535;
events { worker_connections 4096; multi_accept on; use epoll; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json_combined escape=json
        '{"time":"$time_iso8601","method":"$request_method","uri":"$uri","status":$status,'
        '"bytes_sent":$bytes_sent,"duration":$request_time,"remote_addr":"$remote_addr",'
        '"trace_id":"$http_x_trace_id","user_agent":"$http_user_agent"}';

    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    sendfile on; tcp_nopush on; tcp_nodelay on;
    keepalive_timeout 65; types_hash_max_size 2048;
    client_max_body_size 10M; server_tokens off;

    gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=static:10m rate=300r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

    upstream api_backend { server api:5000; keepalive 32; }
    upstream frontend_app { server frontend:80; keepalive 16; }

    # HTTP: serve ACME challenges (for Certbot), redirect everything else to HTTPS
    server {
        listen 80;
        server_name _;

        # Certbot ACME challenge — must be accessible over HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            try_files $uri =404;
        }

        location / { return 301 https://$host$request_uri; }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        # DOMAIN is substituted at container start via envsubst
        server_name BALANZIFY_DOMAIN;

        ssl_certificate /etc/nginx/certs/live/BALANZIFY_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/live/BALANZIFY_DOMAIN/privkey.pem;
        ssl_session_timeout 1d; ssl_session_cache shared:SSL:50m; ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_stapling on; ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; object-src 'none'; frame-ancestors 'none';" always;

        limit_conn conn_limit_per_ip 20;

        # Block metrics endpoint from external access
        location /metrics { deny all; return 403; }

        location /api/v1/auth {
            limit_req zone=auth burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s; proxy_connect_timeout 10s;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            limit_req_status 429;
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s; proxy_connect_timeout 10s;
        }

        location ~ ^/(health|ready)$ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location /static/ {
            proxy_pass http://frontend_app;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            limit_req zone=static burst=30 nodelay;
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
