global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST}:${SMTP_PORT}'
  smtp_from: 'alerts@${DOMAIN}'
  smtp_auth_username: '${SMTP_USER}'
  smtp_auth_password: '${SMTP_PASS}'

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h

receivers:
  - name: default
    email_configs:
      - to: '${ALERT_EMAIL}'
        subject: '[Balanzify] {{ .GroupLabels.alertname }}'
        html: |
          {{ range .Alerts }}
          <b>{{ .Annotations.summary }}</b><br>
          {{ .Annotations.description }}<br>
          Started: {{ .StartsAt }}<br><br>
          {{ end }}

  - name: critical
    email_configs:
      - to: '${ALERT_EMAIL}'
        subject: '[CRITICAL] Balanzify: {{ .GroupLabels.alertname }}'
        send_resolved: true
    webhook_configs:
      - url: '${ALERT_WEBHOOK_URL}'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
