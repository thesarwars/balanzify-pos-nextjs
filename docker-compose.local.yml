# Single-server stack — Postgres + Redis + API + static frontend. NO nginx/TLS
# (put this behind a reverse proxy / load balancer for HTTPS, or use the full
# docker-compose.yml for the bundled nginx + certbot setup).
#
#   Local test:   docker compose -f docker-compose.local.yml up -d --build
#   Real server:  set the env vars below first, then the same command:
#
#     export PUBLIC_API_URL=http://YOUR_SERVER_IP:5050     # where browsers reach the API
#     export PUBLIC_WEB_URL=http://YOUR_SERVER_IP:3500     # where the frontend is served
#     export JWT_SECRET=$(openssl rand -hex 64)
#     export DB_PASSWORD=$(openssl rand -hex 24)
#     docker compose -f docker-compose.local.yml up -d --build
#
#   Verify:  BACKEND_URL=$PUBLIC_API_URL node scripts/contract-smoke.mjs   # → 24/24
name: balanzify-local

networks:
  bz_net:
    driver: bridge

volumes:
  pg_local:
    driver: local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: balanzify
      POSTGRES_USER: balanzify
      POSTGRES_PASSWORD: ${DB_PASSWORD:-balanzify}
    volumes:
      - pg_local:/var/lib/postgresql/data
    networks: [bz_net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balanzify -d balanzify"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    networks: [bz_net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://balanzify:${DB_PASSWORD:-balanzify}@postgres:5432/balanzify?schema=public
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret-change-me-0123456789abcdef0123456789abcdef}
      REDIS_URL: redis://redis:6379
      # Production CORS guard: the API refuses to boot in production without these.
      FRONTEND_URL: ${PUBLIC_WEB_URL:-http://localhost:3500}
      ALLOWED_ORIGINS: ${PUBLIC_WEB_URL:-http://localhost:3500}
      LOG_LEVEL: info
    # Host port 5050 (macOS AirPlay squats on :5000). Must match PUBLIC_API_URL's port.
    ports:
      - "5050:5000"
    networks: [bz_net]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_MODE: real
        # Baked into the static bundle at build time — where the BROWSER reaches the API.
        NEXT_PUBLIC_BACKEND_URL: ${PUBLIC_API_URL:-http://localhost:5050}
    restart: unless-stopped
    ports:
      - "3500:80"
    networks: [bz_net]
    depends_on:
      - api
